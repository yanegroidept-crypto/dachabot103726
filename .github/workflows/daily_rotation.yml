name: Daily Rotation Post (Vasilevna / Edik / Petrovich / Humor / Olya)

on:
  schedule:
    - cron: "36 8 * * *"    # 12:00 МСК (UTC+3) = 09:00 UTC
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run daily rotation (Vasilevna -> Edik -> Petrovich -> Humor -> Olya)
        working-directory: src
        env:
          TG_BOT_TOKEN_VASILEVNA: ${{ secrets.TG_BOT_TOKEN_VASILEVNA }}
          TG_BOT_TOKEN_PETROVICH: ${{ secrets.TG_BOT_TOKEN_PETROVICH }}
          TG_BOT_TOKEN_EDIK: ${{ secrets.TG_BOT_TOKEN_EDIK }}
          TG_BOT_TOKEN_OLYA: ${{ secrets.TG_BOT_TOKEN_OLYA }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          TOPIC_ID_GARDEN: ${{ secrets.TOPIC_ID_GARDEN }}
          TOPIC_ID_EDIK: ${{ secrets.TOPIC_ID_EDIK }}
          TOPIC_ID_HUMOR: ${{ secrets.TOPIC_ID_HUMOR }}
          TOPIC_ID_OLYA: ${{ secrets.TOPIC_ID_OLYA }}
          GEMINI_KEY_1: ${{ secrets.GEMINI_KEY_1 }}
          GEMINI_KEY_2: ${{ secrets.GEMINI_KEY_2 }}
          GEMINI_KEY_3: ${{ secrets.GEMINI_KEY_3 }}
          GEMINI_KEY_4: ${{ secrets.GEMINI_KEY_4 }}
          GEMINI_KEY_5: ${{ secrets.GEMINI_KEY_5 }}
          GEMINI_KEY_6: ${{ secrets.GEMINI_KEY_6 }}
          GEMINI_KEY_7: ${{ secrets.GEMINI_KEY_7 }}
          GEMINI_KEY_8: ${{ secrets.GEMINI_KEY_8 }}
          GEMINI_KEY_9: ${{ secrets.GEMINI_KEY_9 }}
          GEMINI_KEY_10: ${{ secrets.GEMINI_KEY_10 }}
        run: python post_daily_rotation.py

      - name: Commit state changes
        if: always()
        run: |
          git config user.name "dacha-bot"
          git config user.email "bot@users.noreply.github.com"
          git add state/ topics_stack/
          git diff --cached --quiet || git commit -m "chore: update state after daily rotation post"
          git pull --rebase
          git push
