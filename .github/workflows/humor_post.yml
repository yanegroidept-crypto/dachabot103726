name: Dacha Humor Post

on:
  schedule:
    - cron: "27 12 * * *" 
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check cycle day (day 2 = humor day, all three)
        id: cycle
        run: |
          EPOCH_DAY="2026-07-13"  # тот же якорь, что и у Васильевны/Петровича
          DAYS_SINCE=$(( ( $(date -u +%s) - $(date -u -d "$EPOCH_DAY" +%s) ) / 86400 ))
          CYCLE_DAY=$(( DAYS_SINCE % 3 ))
          echo "Cycle day: $CYCLE_DAY"
          if [ "$CYCLE_DAY" -eq "2" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-python@v5
        if: steps.cycle.outputs.run == 'true'
        with:
          python-version: "3.12"

      - name: Install dependencies
        if: steps.cycle.outputs.run == 'true'
        run: pip install -r requirements.txt

      - name: Run humor post (Vasilevna, Petrovich, Edik)
        if: steps.cycle.outputs.run == 'true'
        working-directory: src
        env:
          TG_BOT_TOKEN_VASILEVNA: ${{ secrets.TG_BOT_TOKEN_VASILEVNA }}
          TG_BOT_TOKEN_PETROVICH: ${{ secrets.TG_BOT_TOKEN_PETROVICH }}
          TG_BOT_TOKEN_EDIK: ${{ secrets.TG_BOT_TOKEN_EDIK }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          TOPIC_ID_HUMOR: ${{ secrets.TOPIC_ID_HUMOR }}
        run: python post_humor.py

      - name: Commit state changes
        if: always() && steps.cycle.outputs.run == 'true'
        run: |
          git config user.name "dacha-bot"
          git config user.email "bot@users.noreply.github.com"
          git add state/
          git diff --cached --quiet || git commit -m "chore: update state after humor post"
          git pull --rebase
          git push
