name: Vasilevna Garden Post

on:
  schedule:
    - cron: "36 5 * * *"    # 12:00 МСК (UTC+3) = 09:00 UTC
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check cycle day (day 0 = Vasilevna)
        id: cycle
        run: |
          EPOCH_DAY="2026-07-13"  # день 0 цикла: Васильевна
          DAYS_SINCE=$(( ( $(date -u +%s) - $(date -u -d "$EPOCH_DAY" +%s) ) / 86400 ))
          CYCLE_DAY=$(( DAYS_SINCE % 3 ))
          echo "Cycle day: $CYCLE_DAY"
          if [ "$CYCLE_DAY" -eq "0" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-python@v5
        if: steps.cycle.outputs.run == 'true'
        with:
          python-version: "3.12"

      - name: Install dependencies
        if: steps.cycle.outputs.run == 'true'
        run: pip install -r requirements.txt

      - name: Run garden post (Vasilevna)
        if: steps.cycle.outputs.run == 'true'
        working-directory: src
        env:
          TG_BOT_TOKEN_VASILEVNA: ${{ secrets.TG_BOT_TOKEN_VASILEVNA }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          TOPIC_ID_GARDEN: ${{ secrets.TOPIC_ID_GARDEN }}
          GEMINI_KEY_1: ${{ secrets.GEMINI_KEY_1 }}
          GEMINI_KEY_2: ${{ secrets.GEMINI_KEY_2 }}
          GEMINI_KEY_3: ${{ secrets.GEMINI_KEY_3 }}
          GEMINI_KEY_4: ${{ secrets.GEMINI_KEY_4 }}
          GEMINI_KEY_5: ${{ secrets.GEMINI_KEY_5 }}
          GEMINI_KEY_6: ${{ secrets.GEMINI_KEY_6 }}
          GEMINI_KEY_7: ${{ secrets.GEMINI_KEY_7 }}
          GEMINI_KEY_8: ${{ secrets.GEMINI_KEY_8 }}
          GEMINI_KEY_9: ${{ secrets.GEMINI_KEY_9 }}
          GEMINI_KEY_10: ${{ secrets.GEMINI_KEY_10 }}
        run: python post_garden_vasilevna.py

      - name: Commit state changes
        if: always() && steps.cycle.outputs.run == 'true'
        run: |
          git config user.name "dacha-bot"
          git config user.email "bot@users.noreply.github.com"
          git add state/ topics_stack/
          git diff --cached --quiet || git commit -m "chore: update state after vasilevna garden post"
          git pull --rebase
          git push
